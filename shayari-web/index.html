<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shayari</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

</head>


<body>


<!-- CATEGORY SCREEN -->

<section id="categories" class="screen">


<h1>Shayari Collection</h1>


<div class="category-box">


<button data-category="Love">
❤️
<span>Love</span>
</button>

<button data-category="Romantic">
💕
<span>Romantic</span>
</button>


<button data-category="Sad">
💔
<span>Sad</span>
</button>


<button data-category="Motivation">
🔥
<span>Motivation</span>
</button>


</div>


</section>





<!-- SHAYARI SCREEN -->


<section id="reader" class="screen hidden">


<div class="topbar">

<button id="back">
←
</button>


<h2 id="currentCategory">
</h2>


</div>




<div class="page-stack">


<div class="paper back-one"></div>

<div class="paper back-two"></div>



<div class="paper main-page" id="page">


<div class="texture"></div>



<div class="content">


<h1>
✒
</h1>


<p id="shayari">

</p>


<h3 id="author">

</h3>


<button id="favorite">
♡
</button>


</div>



<div id="counter"></div>



</div>


</div>



</section>



<script src="app.js"></script>

</body>

</html>
